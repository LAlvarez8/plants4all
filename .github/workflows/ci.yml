name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run Prettier
        run: npx prettier --check .

      - name: Run ESLint (LWC)
        run: npx eslint force-app/main/default/lwc/**/*.js

      - name: Run Jest Tests (LWC)
        run: npm run test:unit

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli
          sf plugins install @salesforce/plugin-community

      - name: Authenticate to Dev Hub
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          echo $SFDX_AUTH_URL > auth.txt
          sf org login sfdx-url -f auth.txt -a devhub

      - name: Create Scratch Org
        run: sf org create scratch -f config/project-scratch-def.json -a plants4all-ci -d

      - name: Deploy Code
        run: sf project deploy start --source-dir force-app --target-org plants4all-ci

      - name: Run Apex Tests
        run: sf apex run test --target-org plants4all-ci --synchronous --wait 10

      - name: Upload Apex Coverage
        uses: codecov/codecov-action@v3
        with:
          flags: apex
          fail_ci_if_error: false

      - name: Upload LWC Coverage
        uses: codecov/codecov-action@v3
        with:
          flags: lwc
          fail_ci_if_error: false

      - name: Delete Scratch Org
        run: sf org delete scratch --target-org plants4all-ci -p
