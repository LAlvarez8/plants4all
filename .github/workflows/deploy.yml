name: Salesforce CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Instalar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "18"
          cache: "npm"

      - name: Instalar dependencias
        run: npm install

      - name: Validar formato Prettier
        run: npx prettier --check .

      - name: Ejecutar pruebas LWC
        run: npm run test:unit

      - name: Instalar Salesforce CLI (binario oficial)
        uses: svierk/sfdx-cli-setup@main
        with:
          version: "latest"

      - name: Verificar instalación
        run: sf --version

      - name: Autenticarse con Dev Hub
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          # Usar la URL directamente con --sfdx-url
          sf org login sfdx-url --sfdx-url "$SFDX_AUTH_URL" -a devhub -d

      - name: Ejecutar pruebas Apex
        run: sf apex run test --target-org devhub --synchronous --wait 10 --result-format human

      - name: Desplegar a la org
        run: sf project deploy start --source-dir force-app --target-org devhub --wait 10
