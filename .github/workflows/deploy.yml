name: Salesforce CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Instalar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "18"
          cache: npm

      - name: Verificar Node
        run: |
          node --version
          npm --version

      - name: Instalar dependencias
        run: npm ci

      - name: Validar formato
        run: npx prettier --check .

      - name: Ejecutar pruebas LWC
        run: npm run test:unit

      - name: Instalar Salesforce CLI
        run: |
          wget https://developer.salesforce.com/media/salesforce-cli/sf/channels/stable/sf-linux-x64.tar.xz
          mkdir sf
          tar xJf sf-linux-x64.tar.xz -C sf --strip-components 1
          echo "$PWD/sf/bin" >> $GITHUB_PATH

      - name: Verificar Salesforce CLI
        run: sf version

      # --- AUTENTICACIÓN CON SFDX (ESTABLE Y SIN BUG) ---
      - name: Autenticar org
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          # Limpiar URL: eliminar saltos de línea, retornos de carro y caracteres no imprimibles
          echo "$SFDX_AUTH_URL" | tr -d '\n\r' | tr -cd '[:print:]' > auth.txt
          # Mostrar depuración (sin exponer el secreto completo)
          echo "🔍 Longitud: $(wc -c < auth.txt)"
          echo "🔍 Inicio: $(head -c 20 auth.txt)"
          # Autenticar con sfdx (evita el bug de regex)
          sfdx force:auth:sfdxurl:store -f auth.txt -a devhub -d

      - name: Ejecutar pruebas Apex
        run: |
          sf apex run test \
            --target-org devhub \
            --wait 20 \
            --result-format human

      - name: Deploy
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org devhub \
            --wait 20
