name: Salesforce CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    # 🔥 Usamos el contenedor oficial de Salesforce CLI
    container:
      image: salesforce/cli:latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      # 🟢 Node.js no está preinstalado en el contenedor, lo instalamos manualmente para LWC
      - name: Instalar Node.js y npm
        run: |
          apt-get update
          apt-get install -y nodejs npm

      - name: Instalar dependencias npm (Jest, Prettier)
        run: npm install

      - name: Validar formato con Prettier
        run: npx prettier --check .

      - name: Ejecutar pruebas LWC
        run: npm run test:unit

      - name: Verificar Salesforce CLI
        run: sf --version

      - name: Autenticarse con Dev Hub
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          echo "$SFDX_AUTH_URL" > auth.txt
          sf org login sfdx-url -f auth.txt -a devhub -d

      - name: Ejecutar pruebas Apex
        run: sf apex run test --target-org devhub --synchronous --wait 10 --result-format human

      - name: Desplegar a la org
        run: sf project deploy start --source-dir force-app --target-org devhub --wait 10
