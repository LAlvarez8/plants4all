name: Salesforce CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # --- 1. Descargar el código ---
      - name: Checkout código
        uses: actions/checkout@v5

      # --- 2. Configurar Node.js (necesario para LWC y Prettier) ---
      - name: Instalar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      # --- 3. Instalar dependencias (LWC, Jest, Prettier) ---
      - name: Instalar dependencias npm
        run: npm install

      # --- 4. Validar formato del código (Prettier) ---
      - name: Validar formato con Prettier
        run: npx prettier --check .

      # --- 5. Ejecutar pruebas de LWC (Jest) ---
      - name: Ejecutar pruebas LWC
        run: npm run test:unit

      # --- 6. Instalar y autenticar Salesforce CLI (Acción dedicada) ---
      - name: Setup Salesforce CLI
        uses: rdbumstead/setup-salesforce-action@v2
        with:
          auth_method: "sfdx-url"
          sfdx_auth_url: ${{ secrets.SFDX_AUTH_URL }}

      # --- 7. Ejecutar pruebas Apex (validación) ---
      - name: Ejecutar pruebas Apex
        run: sf apex run test --target-org devhub --synchronous --wait 10 --result-format human

      # --- 8. Desplegar solo si todo lo anterior funcionó ---
      - name: Desplegar a la org
        run: sf project deploy start --source-dir force-app --target-org devhub --wait 10
