name: Salesforce CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Instalar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "18"
          cache: npm

      - name: Verificar Node
        run: |
          node --version
          npm --version

      - name: Instalar dependencias
        run: npm ci

      - name: Validar formato
        run: npx prettier --check .

      - name: Ejecutar pruebas LWC
        run: npm run test:unit

      - name: Instalar Salesforce CLI
        run: |
          wget https://developer.salesforce.com/media/salesforce-cli/sf/channels/stable/sf-linux-x64.tar.xz
          mkdir sf
          tar xJf sf-linux-x64.tar.xz -C sf --strip-components 1
          echo "$PWD/sf/bin" >> $GITHUB_PATH

      - name: Verificar Salesforce CLI
        run: sf version

      # --- AUTENTICACIÓN CORREGIDA ---
      - name: Autenticar org
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          # Limpiar la URL de saltos de línea y caracteres no imprimibles
          CLEAN_URL=$(echo "$SFDX_AUTH_URL" | tr -d '\n\r' | tr -cd '[:print:]')
          # Guardar en archivo
          echo "$CLEAN_URL" > auth.txt
          # Mostrar longitud y primeros caracteres para depuración
          echo "🔍 Longitud del archivo: $(wc -c < auth.txt)"
          echo "🔍 Primeros 20 caracteres: $(head -c 20 auth.txt)"
          # Usar sfdx (el comando antiguo) porque es más estable
          sfdx force:auth:sfdxurl:store -f auth.txt -a devhub -d

      - name: Ejecutar pruebas Apex
        run: |
          sf apex run test \
            --target-org devhub \
            --wait 20 \
            --result-format human

      - name: Deploy
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org devhub \
            --wait 20
