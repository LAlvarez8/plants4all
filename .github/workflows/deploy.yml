name: Salesforce CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Autenticarse con Dev Hub
        run: echo ${{ secrets.SFDX_AUTH_URL }} > sfdx_auth.txt && sf org login sfdx-url -f sfdx_auth.txt -a devhub

      - name: Deploy a la org
        run: sf project deploy start --source-dir force-app --target-org devhub
