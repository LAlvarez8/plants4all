name: Salesforce CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Instalar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "18"
          cache: "npm"

      - name: Instalar dependencias npm
        run: npm install

      - name: Validar formato con Prettier
        run: npx prettier --check .

      - name: Ejecutar pruebas LWC
        run: npm run test:unit

      # --- INSTALAR SALESFORCE CLI CON ACCIÓN OFICIAL ---
      - name: Instalar Salesforce CLI (acción oficial)
        uses: salesforce/cli@v2
        with:
          version: "latest"

      - name: Verificar instalación
        run: sf --version

      # --- AUTENTICACIÓN CON ARCHIVO LIMPIO ---
      - name: Autenticarse con Dev Hub
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          # Limpiar la URL: eliminar saltos de línea, retornos de carro y caracteres no imprimibles
          echo "$SFDX_AUTH_URL" | tr -d '\n\r' | tr -cd '[:print:]' > auth.txt
          # Mostrar longitud y primeros caracteres para depuración
          echo "🔍 Longitud del archivo: $(wc -c < auth.txt)"
          echo "🔍 Primeros 20 caracteres: $(head -c 20 auth.txt)"
          echo "🔍 Últimos 10 caracteres: $(tail -c 10 auth.txt)"
          # Intentar autenticar con sf (nuevo CLI)
          if sf org login sfdx-url -f auth.txt -a devhub -d --json; then
            echo "✅ Autenticación con sf exitosa"
          else
            echo "⚠️ Falló autenticación con sf, intentando con sfdx..."
            sfdx force:auth:sfdxurl:store -f auth.txt -a devhub -d
          fi

      - name: Ejecutar pruebas Apex
        run: sf apex run test --target-org devhub --synchronous --wait 10 --result-format human

      - name: Desplegar a la org
        run: sf project deploy start --source-dir force-app --target-org devhub --wait 10
