name: Salesforce CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # --- 1. Descargar el código ---
      - name: Checkout código
        uses: actions/checkout@v5

      # --- 2. Configurar Node.js (necesario para LWC y Prettier) ---
      - name: Instalar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      # --- 3. Instalar dependencias (LWC, Jest, Prettier) ---
      - name: Instalar dependencias npm
        run: npm install

      # --- 4. Validar formato del código (Prettier) ---
      - name: Validar formato con Prettier
        run: npx prettier --check .

      # --- 5. Ejecutar pruebas de LWC (Jest) ---
      - name: Ejecutar pruebas LWC
        run: npm run test:unit

      # --- 6. Instalar Salesforce CLI (de forma estable) ---
      - name: Instalar Salesforce CLI
        run: |
          npm install @salesforce/cli --location=global
          echo "$(npm config get prefix)/bin" >> $GITHUB_PATH

      - name: Verificar instalación de Salesforce CLI
        run: sf --version

      # --- 7. Autenticarse con Dev Hub ---
      - name: Autenticarse con Dev Hub
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          echo "$SFDX_AUTH_URL" > auth.txt
          sf org login sfdx-url -f auth.txt -a devhub -d

      # --- 8. Ejecutar pruebas Apex (validación) ---
      - name: Ejecutar pruebas Apex
        run: sf apex run test --target-org devhub --synchronous --wait 10 --result-format human

      # --- 9. Desplegar solo si todo lo anterior funcionó ---
      - name: Desplegar a la org
        run: sf project deploy start --source-dir force-app --target-org devhub --wait 10
