name: Salesforce CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Instalar Node.js (LTS estable)
        uses: actions/setup-node@v5
        with:
          node-version: "18"
          cache: "npm"

      - name: Instalar dependencias npm
        run: npm install

      - name: Validar formato con Prettier
        run: npx prettier --check .

      - name: Ejecutar pruebas LWC
        run: npm run test:unit

      # --- INSTALAR SALESFORCE CLI DESDE BINARIO OFICIAL ---
      - name: Instalar Salesforce CLI
        uses: svierk/sfdx-cli-setup@main
        with:
          version: "latest"

      - name: Verificar instalación
        run: sf --version

      # --- AUTENTICACIÓN ---
      - name: Autenticarse con Dev Hub
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          echo "$SFDX_AUTH_URL" > auth.txt
          sf org login sfdx-url -f auth.txt -a devhub -d

      # --- PRUEBAS APEX ---
      - name: Ejecutar pruebas Apex
        run: sf apex run test --target-org devhub --synchronous --wait 10 --result-format human

      # --- DESPLIEGUE ---
      - name: Desplegar a la org
        run: sf project deploy start --source-dir force-app --target-org devhub --wait 10
