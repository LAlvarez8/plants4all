name: Salesforce CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Instalar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "18"
          cache: "npm"

      - name: Instalar dependencias npm
        run: npm install

      - name: Validar formato con Prettier
        run: npx prettier --check .

      - name: Ejecutar pruebas LWC
        run: npm run test:unit

      - name: Instalar Salesforce CLI
        run: |
          npm install @salesforce/cli@2.139.6 --location=global
          echo "$(npm config get prefix)/bin" >> $GITHUB_PATH

      - name: Verificar instalación
        run: sf --version

      # --- AUTENTICACIÓN USANDO LA URL DIRECTAMENTE ---
      - name: Autenticarse con Dev Hub
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          # Mostrar información de depuración (primeros 20 caracteres y longitud)
          echo "Longitud de la URL: ${#SFDX_AUTH_URL}"
          echo "Primeros 20 caracteres: ${SFDX_AUTH_URL:0:20}"

          # Intentar autenticar con sf (nuevo CLI) usando la URL directa
          if sf org login sfdx-url --sfdx-url "$SFDX_AUTH_URL" -a devhub -d --json; then
            echo "✅ Autenticación con sf exitosa"
          else
            echo "⚠️ Falló autenticación con sf, intentando con sfdx..."
            sfdx force:auth:sfdxurl:store --sfdxurl "$SFDX_AUTH_URL" -a devhub -d
          fi

      - name: Ejecutar pruebas Apex
        run: sf apex run test --target-org devhub --synchronous --wait 10 --result-format human

      - name: Desplegar a la org
        run: sf project deploy start --source-dir force-app --target-org devhub --wait 10
