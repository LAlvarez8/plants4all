name: Salesforce CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Instalar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias npm
        run: npm ci

      - name: Validar formato con Prettier
        run: npx prettier --check .

      - name: Ejecutar pruebas LWC
        run: npm run test:unit

      - name: Instalar Salesforce CLI
        run: |
          npm install -g @salesforce/cli
          sf --version

      - name: Autenticarse con la org
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          echo "$SFDX_AUTH_URL" > auth.txt
          sf org login sfdx-url \
            --sfdx-url-file auth.txt \
            --alias devhub \
            --set-default

      - name: Ejecutar pruebas Apex
        run: |
          sf apex run test \
            --target-org devhub \
            --wait 20 \
            --result-format human

      - name: Deploy
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org devhub \
            --wait 20
