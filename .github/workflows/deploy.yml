name: Salesforce CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Instalar Salesforce CLI con npm
        run: |
          npm install @salesforce/cli --location=global
          npm_prefix=$(npm config get prefix)
          echo "$npm_prefix/bin" >> $GITHUB_PATH

      - name: Verificar instalación de sf
        run: sf version

      - name: Autenticarse con Dev Hub
        run: echo ${{ secrets.SFDX_AUTH_URL }} > sfdx_auth.txt && sf org login sfdx-url -f sfdx_auth.txt -a devhub

      - name: Desplegar código a la org
        run: sf project deploy start --source-dir force-app --target-org devhub
