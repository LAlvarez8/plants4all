<template>
    <lightning-card title="🌿 Nueva Especie y Planta">
        <div class="slds-p-around_medium">
            <!-- Formulario para la especie -->
            <lightning-record-form
                object-api-name="Species__c"
                layout-type="Full"
                fields={speciesFields}
                onsuccess={handleSpeciesSuccess}
                onerror={handleError}
            >
            </lightning-record-form>

            <!-- Formulario para la planta (se habilita después de crear la especie) -->
            <template if:true={speciesId}>
                <lightning-record-form
                    object-api-name="Plant__c"
                    layout-type="Full"
                    fields={plantFields}
                    onsuccess={handlePlantSuccess}
                    onerror={handleError}
                >
                </lightning-record-form>
            </template>

            <!-- Botones -->
            <div class="slds-m-top_medium">
                <template if:false={speciesId}>
                    <lightning-button label="Crear Especie" variant="brand" onclick={createSpecies}></lightning-button>
                </template>
                <template if:true={speciesId}>
                    <lightning-button label="Crear Planta" variant="brand" onclick={createPlant}></lightning-button>
                </template>
                <lightning-button label="Cancelar" variant="neutral" onclick={handleCancel}></lightning-button>
            </div>

            <!-- Mensajes -->
            <template if:true={message}>
                <div class={messageClass} role="alert">{message}</div>
            </template>
        </div>
    </lightning-card>
</template>
