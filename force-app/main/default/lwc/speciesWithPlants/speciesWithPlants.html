<template>
    <div class="slds-box slds-theme_default">
        <h1 class="slds-text-heading_medium slds-m-bottom_medium">🌿 Especies y sus plantas</h1>

        <template if:true={loading}>
            <lightning-spinner alternative-text="Cargando..." size="medium"></lightning-spinner>
        </template>

        <template if:true={error}>
            <div class="slds-text-color_error">Error al cargar los datos: {error.message}</div>
        </template>

        <template if:true={speciesList}>
            <lightning-accordion>
                <template for:each={speciesList} for:item="species">
                    <lightning-accordion-section
                        key={species.Id}
                        name={species.Id}
                        label={species.Name}
                    >
                        <template if:true={species.Plants__r}>
                            <ul class="slds-list_dotted slds-m-left_medium">
                                <template for:each={species.Plants__r} for:item="plant">
                                    <li key={plant.Id}>{plant.Name}</li>
                                </template>
                            </ul>
                        </template>
                        <template if:false={species.Plants__r}>
                            <p class="slds-text-color_weak slds-m-left_medium">🌱 Esta especie no tiene plantas</p>
                        </template>
                    </lightning-accordion-section>
                </template>
            </lightning-accordion>
        </template>
    </div>
</template>
